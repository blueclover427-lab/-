<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>실시간 부부 가계부</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

  <main class="max-w-5xl mx-auto p-4 space-y-6">
    <header class="flex justify-between items-center">
      <h1 class="text-xl font-bold text-indigo-600">실시간 부부 가계부</h1>
      <span id="sync-status" class="text-xs text-slate-500">연결 중...</span>
    </header>

    <!-- 요약 -->
    <section class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="bg-white rounded-xl shadow p-3 text-xs">
        <div class="text-slate-400">이번 달 합계</div>
        <div id="kpi-total" class="text-lg font-bold mt-1">0원</div>
      </div>
      <div class="bg-white rounded-xl shadow p-3 text-xs">
        <div class="text-slate-400">건수</div>
        <div id="kpi-count" class="text-lg font-bold mt-1">0건</div>
      </div>
      <div class="bg-white rounded-xl shadow p-3 text-xs">
        <div class="text-slate-400">평균 지출</div>
        <div id="kpi-avg" class="text-lg font-bold mt-1">0원</div>
      </div>
      <div class="bg-white rounded-xl shadow p-3 text-xs">
        <div class="text-slate-400">마지막 수정</div>
        <div id="kpi-updated" class="text-[11px] font-semibold mt-1 text-slate-700">-</div>
      </div>
    </section>

    <!-- 입력 폼 -->
    <section class="bg-white rounded-xl shadow p-4 space-y-4">
      <h2 class="text-sm font-bold text-slate-800">새 지출 입력</h2>
      <form id="entryForm" class="grid md:grid-cols-2 gap-3 text-xs">
        <div>
          <label class="block mb-1 text-slate-600">날짜</label>
          <input type="date" id="fDate"
                 class="w-full border rounded-lg px-2 py-1.5 text-sm"
                 required />
        </div>
        <div>
          <label class="block mb-1 text-slate-600">카테고리</label>
          <div class="grid gap-1.5">
            <select id="fCategoryPreset"
                    class="w-full border rounded-lg px-2 py-1.5 text-sm">
              <option value="">드롭박스에서 선택</option>
              <option value="식비">식비</option>
              <option value="육아">육아</option>
              <option value="교육">교육</option>
              <option value="주거">주거</option>
              <option value="교통">교통</option>
              <option value="쇼핑">쇼핑</option>
              <option value="의료">의료</option>
              <option value="외식">외식</option>
              <option value="통신">통신</option>
              <option value="생활">생활</option>
              <option value="보험">보험</option>
              <option value="기타">기타</option>
            </select>
            <input id="fCategory"
                   class="w-full border rounded-lg px-2 py-1.5 text-sm"
                   placeholder="또는 직접 입력"
                   required />
          </div>
        </div>
        <div>
          <label class="block mb-1 text-slate-600">지출처</label>
          <input id="fPlace"
                 class="w-full border rounded-lg px-2 py-1.5 text-sm"
                 placeholder="예: 이마트, 약국"
                 required />
        </div>
        <div>
          <label class="block mb-1 text-slate-600">결제수단</label>
          <div class="grid gap-1.5">
            <select id="fMethodPreset"
                    class="w-full border rounded-lg px-2 py-1.5 text-sm">
              <option value="">드롭박스에서 선택</option>
              <option value="국민카드">국민카드</option>
              <option value="하나카드">하나카드</option>
              <option value="삼성카드">삼성카드</option>
              <option value="계좌이체">계좌이체</option>
              <option value="현금">현금</option>
            </select>
            <input id="fMethod"
                   class="w-full border rounded-lg px-2 py-1.5 text-sm"
                   placeholder="또는 직접 입력"
                   required />
          </div>
        </div>
        <div>
          <label class="block mb-1 text-slate-600">금액 (원)</label>
          <input id="fAmount"
                 class="w-full border rounded-lg px-2 py-1.5 text-sm text-right"
                 placeholder="0"
                 inputmode="numeric"
                 required />
        </div>
        <div>
          <label class="block mb-1 text-slate-600">메모</label>
          <input id="fMemo"
                 class="w-full border rounded-lg px-2 py-1.5 text-sm"
                 placeholder="선택 사항" />
        </div>
        <div class="md:col-span-2 flex gap-2 mt-2">
          <button type="submit"
                  class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2 rounded-lg">
            저장하기
          </button>
          <button type="button" id="btnReset"
                  class="px-3 py-2 border rounded-lg text-xs text-slate-600">
            폼 초기화
          </button>
        </div>
      </form>
    </section>

    <!-- 내역 테이블 -->
    <section class="bg-white rounded-xl shadow p-4">
      <div class="flex justify-between items-center mb-2 text-xs">
        <h2 class="font-bold text-slate-800">지출 내역</h2>
        <span id="row-count" class="text-slate-400">0건</span>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full text-[11px]">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="px-2 py-1 text-left">날짜</th>
              <th class="px-2 py-1 text-left">카테고리</th>
              <th class="px-2 py-1 text-left">지출처</th>
              <th class="px-2 py-1 text-left">결제수단</th>
              <th class="px-2 py-1 text-right">금액</th>
              <th class="px-2 py-1 text-left">메모</th>
              <th class="px-2 py-1 text-center">관리</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Firebase + 앱 스크립트 -->
  <script type="module">
    // 1. Firebase SDK 로드 및 초기화 [web:201][web:199]
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
      getDatabase, ref, push, set, onValue, remove
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    // TODO: 여기에 본인 프로젝트 설정 값을 붙여 넣으세요.
const firebaseConfig = {
  apiKey: "AIzaSyBQ9xAaHvj8EetPngUcikGgfXog9-2kvhE",
  authDomain: "household-ledger-c5ff8.firebaseapp.com",
  projectId: "household-ledger-c5ff8",
  storageBucket: "household-ledger-c5ff8.firebasestorage.app",
  messagingSenderId: "671578590446",
  appId: "1:671578590446:web:a8463d32a79cf9af17f7ff",
  measurementId: "G-JVX0VJ7778"
};

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    const entriesRef = ref(db, "ledgerEntries"); // 한 가정(부부) 공용 노드

    const $ = (id) => document.getElementById(id);
    const fmt = (n) => (Number(n) || 0).toLocaleString("ko-KR") + "원";

    // 드롭박스 → 입력칸 자동 반영
    function applyPreset(selectId, inputId) {
      const sel = $(selectId);
      const input = $(inputId);
      if (sel && input && sel.value) input.value = sel.value;
    }
    $("fCategoryPreset").addEventListener("change",
      () => applyPreset("fCategoryPreset", "fCategory"));
    $("fMethodPreset").addEventListener("change",
      () => applyPreset("fMethodPreset", "fMethod"));

    // 금액 입력 포맷
    $("fAmount").addEventListener("input", (e) => {
      const onlyNum = e.target.value.replace(/[^0-9]/g, "");
      e.target.value = onlyNum.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    });

    // 오늘 날짜 기본값
    $("fDate").value = new Date().toISOString().slice(0, 10);

    // 2. 새 내역 저장 (push) [web:50][web:53]
    $("entryForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const date = $("fDate").value;
      const category = $("fCategory").value.trim() || "기타";
      const place = $("fPlace").value.trim();
      const method = $("fMethod").value.trim();
      const amountNum = Number($("fAmount").value.replace(/[^0-9]/g, "")) || 0;
      const memo = $("fMemo").value.trim();

      if (!date || !place || !method || amountNum <= 0) {
        alert("날짜 / 지출처 / 결제수단 / 금액을 확인해주세요.");
        return;
      }

      const newRef = push(entriesRef);
      await set(newRef, {
        date, category, place, method,
        amount: amountNum,
        memo,
        createdAt: Date.now()
      });

      $("entryForm").reset();
      $("fCategoryPreset").value = "";
      $("fMethodPreset").value = "";
      $("fDate").value = new Date().toISOString().slice(0, 10);
    });

    $("btnReset").addEventListener("click", () => {
      $("entryForm").reset();
      $("fCategoryPreset").value = "";
      $("fMethodPreset").value = "";
      $("fDate").value = new Date().toISOString().slice(0, 10);
    });

    // 3. 실시간 동기화: DB 변경 → 화면 자동 반영 [web:50][web:202]
    onValue(entriesRef, (snap) => {
      const data = snap.val() || {};
      const rows = Object.entries(data)
        .map(([id, v]) => ({ id, ...v }))
        .sort((a, b) => (a.date < b.date ? 1 : -1));

      const tbody = $("tableBody");
      tbody.innerHTML = "";
      let total = 0;

      rows.forEach((r) => {
        total += r.amount;
        const tr = document.createElement("tr");
        tr.className = "hover:bg-slate-50";

        tr.innerHTML = `
          <td class="px-2 py-1 whitespace-nowrap">${r.date}</td>
          <td class="px-2 py-1 whitespace-nowrap">${r.category || "-"}</td>
          <td class="px-2 py-1 whitespace-nowrap">${r.place}</td>
          <td class="px-2 py-1 whitespace-nowrap">${r.method}</td>
          <td class="px-2 py-1 text-right font-semibold">${fmt(r.amount)}</td>
          <td class="px-2 py-1 whitespace-nowrap">${r.memo || "-"}</td>
          <td class="px-2 py-1 text-center">
            <button data-id="${r.id}"
              class="text-[10px] text-rose-500 border border-rose-500 px-1.5 py-0.5 rounded delete-btn">
              삭제
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      $("row-count").textContent = `${rows.length}건`;
      $("kpi-total").textContent = fmt(total);
      $("kpi-count").textContent = `${rows.length}건`;
      $("kpi-avg").textContent =
        rows.length ? fmt(Math.round(total / rows.length)) : "0원";
      $("kpi-updated").textContent =
        rows.length ? new Date().toLocaleString("ko-KR") : "-";
      $("sync-status").textContent = "실시간 연결됨";

      // 삭제 버튼 이벤트
      document.querySelectorAll(".delete-btn").forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-id");
          if (confirm("이 내역을 삭제할까요?")) {
            await remove(ref(db, "ledgerEntries/" + id));
          }
        };
      });
    }, (err) => {
      console.error(err);
      $("sync-status").textContent = "연결 오류";
    });
  </script>
</body>
</html>
